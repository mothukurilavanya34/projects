<!DOCTYPE html>
<html>

<head>
<title>Video Plan Upgrade</title>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>

body{
font-family:Arial;
background:#f0f0f0;
padding:20px;
text-align:center;
}

.container{
background:white;
padding:20px;
border-radius:10px;
max-width:800px;
margin:auto;
}

.plan{
border:1px solid #ddd;
padding:15px;
margin:10px;
border-radius:10px;
}

button{
padding:10px 20px;
background:#007bff;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

video{
width:100%;
margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<h2>🎬 Video Platform</h2>

<h3>Current Plan: <span id="planName">Free</span></h3>

<div class="plan">
<h3>Free Plan</h3>
<p>Watch videos for 5 minutes</p>
</div>

<div class="plan">
<h3>Bronze Plan - ₹10</h3>
<p>Watch videos for 7 minutes</p>
<button onclick="buyPlan('Bronze',10,7)">Upgrade</button>
</div>

<div class="plan">
<h3>Silver Plan - ₹50</h3>
<p>Watch videos for 10 minutes</p>
<button onclick="buyPlan('Silver',50,10)">Upgrade</button>
</div>

<div class="plan">
<h3>Gold Plan - ₹100</h3>
<p>Unlimited watching</p>
<button onclick="buyPlan('Gold',100,'unlimited')">Upgrade</button>
</div>

<h2>Watch Video</h2>

<video id="videoPlayer" controls>

<source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">

</video>

</div>

<script>

let plan = localStorage.getItem("userPlan") || "Free"
document.getElementById("planName").innerText = plan

let limits = {
"Free":5,
"Bronze":7,
"Silver":10,
"Gold":"unlimited"
}

let video = document.getElementById("videoPlayer")

video.addEventListener("timeupdate",function(){

let currentPlan = localStorage.getItem("userPlan") || "Free"
let limit = limits[currentPlan]

if(limit !== "unlimited"){

if(video.currentTime >= limit * 60){

video.pause()

alert("Your watching limit is over. Upgrade your plan.")

}

}

})

function buyPlan(planName,price,limit){

var options = {

"key":"rzp_test_123456789",

"amount":price * 100,

"currency":"INR",

"name":"Video Platform",

"description":planName + " Plan",

handler:function(response){

localStorage.setItem("userPlan",planName)

alert("Payment Successful!")

alert("Invoice sent to your email for "+planName+" Plan")

location.reload()

}

}

var rzp1 = new Razorpay(options)

rzp1.open()

}

</script>

</body>

</html>
