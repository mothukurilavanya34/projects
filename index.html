<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Task 5 - Gesture Video Player</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #111;
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
    }

    #videoContainer {
        position: relative;
        width: 80%;
        max-width: 800px;
    }

    video {
        width: 100%;
        border-radius: 10px;
        background: black;
    }

    #commentsSection {
        display: none;
        background: #222;
        width: 80%;
        max-width: 800px;
        margin-top: 10px;
        padding: 15px;
        border-radius: 8px;
    }

    #commentsSection h3 {
        margin-top: 0;
    }

    .video-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        cursor: pointer;
    }
</style>
</head>
<body>

<h2>🎥 Custom Gesture Video Player</h2>

<div id="videoContainer">
    <video id="videoPlayer">
        <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
        Your browser does not support HTML5 video.
    </video>
    <div class="video-overlay" id="overlay"></div>
</div>

<div id="commentsSection">
    <h3>💬 Comments</h3>
    <p>This is the comment section. It opens on triple-tap left.</p>
</div>

<script>
const video = document.getElementById("videoPlayer");
const overlay = document.getElementById("overlay");
const comments = document.getElementById("commentsSection");

let tapCount = 0;
let tapTimer = null;

// Gesture handler
overlay.addEventListener("click", function(event){
    const rect = overlay.getBoundingClientRect();
    const x = event.clientX - rect.left; // X relative to video
    const width = rect.width;
    const y = event.clientY - rect.top; // Y relative to video

    tapCount++;

    if(tapTimer) clearTimeout(tapTimer);

    tapTimer = setTimeout(()=>{
        // Determine tap type
        if(tapCount === 1){
            // Single tap center
            if(x > width*0.33 && x < width*0.66){
                if(video.paused) video.play();
                else video.pause();
            }
        }
        else if(tapCount === 2){
            // Double tap left/right
            if(x < width/2){
                video.currentTime = Math.max(video.currentTime - 10, 0);
            } else {
                video.currentTime = Math.min(video.currentTime + 10, video.duration);
            }
        }
        else if(tapCount === 3){
            // Triple tap
            if(x < width/3){
                // Left → show comments
                comments.style.display = comments.style.display === "none" ? "block" : "none";
            } else if(x > width*2/3){
                // Right → close window
                alert("Closing website (simulate)");
                // window.close(); // works only if window opened via JS
            } else {
                // Center → next video
                video.currentTime = 0; // reset current video
                alert("Skipped to next video (simulate)");
            }
        }
        tapCount = 0;
    }, 300); // 300ms threshold to detect multi-taps
});

</script>

</body>
</html>
