<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Task 4 - Dynamic Theme & OTP</title>
<style>
    body {
        font-family: Arial, sans-serif;
        transition: all 0.5s ease;
        padding: 20px;
        text-align: center;
    }

    h2 {
        margin-bottom: 20px;
    }

    .login-box {
        background: rgba(255,255,255,0.1);
        padding: 20px;
        border-radius: 10px;
        display: inline-block;
    }

    input, select, button {
        padding: 10px;
        margin: 10px 0;
        width: 250px;
        border-radius: 5px;
        border: 1px solid #ccc;
    }

    button {
        width: 270px;
        cursor: pointer;
        background: #007bff;
        color: white;
        border: none;
    }

    button:hover {
        background: #0056b3;
    }

    #otpSection {
        display: none;
        margin-top: 20px;
    }
</style>
</head>
<body>

<h2>🌐 Dynamic Theme & Regional OTP</h2>

<div class="login-box">
    <label for="state">Select Your State:</label><br>
    <select id="state">
        <option value="">--Select State--</option>
        <option value="Tamil Nadu">Tamil Nadu</option>
        <option value="Kerala">Kerala</option>
        <option value="Karnataka">Karnataka</option>
        <option value="Andhra Pradesh">Andhra Pradesh</option>
        <option value="Telangana">Telangana</option>
        <option value="Maharashtra">Maharashtra</option>
        <option value="Delhi">Delhi</option>
        <option value="Other">Other</option>
    </select><br>

    <label for="contact">Enter Email or Mobile:</label><br>
    <input type="text" id="contact" placeholder="Email or Mobile"><br>

    <button onclick="login()">Login</button>

    <div id="otpSection">
        <input type="text" id="otpInput" placeholder="Enter OTP"><br>
        <button onclick="verifyOTP()">Verify OTP</button>
    </div>
</div>

<script>
// Southern states list
const southStates = ["Tamil Nadu", "Kerala", "Karnataka", "Andhra Pradesh", "Telangana"];
let generatedOTP = "";

// --- Dynamic Theme ---
function applyTheme() {
    const state = document.getElementById("state").value;
    const now = new Date();

    // IST offset = UTC+5:30 → convert user local time if needed
    const hours = now.getHours();
    const minutes = now.getMinutes();

    const isSouth = southStates.includes(state);
    const isMorning = (hours >= 10 && hours < 12);

    if(isSouth && isMorning){
        // Light theme
        document.body.style.background = "white";
        document.body.style.color = "black";
    } else {
        // Dark theme
        document.body.style.background = "#111";
        document.body.style.color = "white";
    }
}

// --- Login & OTP ---
function login(){
    const state = document.getElementById("state").value;
    const contact = document.getElementById("contact").value.trim();

    if(state === "" || contact === ""){
        alert("Please select state and enter email/mobile!");
        return;
    }

    applyTheme();

    // Generate 4-digit OTP
    generatedOTP = Math.floor(1000 + Math.random() * 9000).toString();

    if(southStates.includes(state)){
        alert(`OTP sent to your EMAIL: ${generatedOTP}`);
    } else {
        alert(`OTP sent to your MOBILE: ${generatedOTP}`);
    }

    document.getElementById("otpSection").style.display = "block";
}

// --- Verify OTP ---
function verifyOTP(){
    const userOTP = document.getElementById("otpInput").value.trim();
    if(userOTP === generatedOTP){
        alert("✅ Login successful!");
        document.getElementById("otpSection").style.display = "none";
    } else {
        alert("❌ Incorrect OTP. Try again!");
    }
}

// Optional: Update theme if state changes before login
document.getElementById("state").addEventListener("change", applyTheme);

</script>

</body>
</html>
