<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Task 6 - Video Call + Screen Share + Recording</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #222;
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
    }

    h2 {
        margin-bottom: 20px;
    }

    video {
        width: 400px;
        height: 250px;
        background: black;
        margin: 10px;
        border-radius: 8px;
    }

    .controls {
        margin: 20px;
    }

    button {
        padding: 10px 15px;
        margin: 5px;
        border: none;
        border-radius: 5px;
        background-color: #007bff;
        color: white;
        cursor: pointer;
    }

    button:hover {
        background-color: #0056b3;
    }
</style>
</head>
<body>

<h2>📹 Video Call + Screen Share + Recording</h2>

<div>
    <video id="localVideo" autoplay muted></video>
    <video id="remoteVideo" autoplay></video>
</div>

<div class="controls">
    <button onclick="startCall()">Start Call</button>
    <button onclick="stopCall()">Stop Call</button>
    <button onclick="shareScreen()">Share Screen</button>
    <button onclick="stopScreenShare()">Stop Screen Share</button>
    <button onclick="startRecording()">Start Recording</button>
    <button onclick="stopRecording()">Stop & Save Recording</button>
</div>

<script>
let localStream;
let screenStream;
let mediaRecorder;
let recordedChunks = [];
const localVideo = document.getElementById("localVideo");
const remoteVideo = document.getElementById("remoteVideo");

// --- Start Video Call ---
async function startCall() {
    try {
        localStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
        localVideo.srcObject = localStream;

        // Simulate remote video by cloning local stream
        remoteVideo.srcObject = localStream;

        alert("Call started (local demo). Screen sharing & recording available!");
    } catch (err) {
        alert("Error accessing camera/microphone: " + err);
    }
}

// --- Stop Call ---
function stopCall() {
    if (localStream) {
        localStream.getTracks().forEach(track => track.stop());
        localStream = null;
    }

    if (screenStream) {
        screenStream.getTracks().forEach(track => track.stop());
        screenStream = null;
    }

    localVideo.srcObject = null;
    remoteVideo.srcObject = null;

    alert("Call ended.");
}

// --- Share Screen ---
async function shareScreen() {
    try {
        screenStream = await navigator.mediaDevices.getDisplayMedia({video: true});
        remoteVideo.srcObject = screenStream;
        alert("Screen sharing started. You can now show YouTube or any website.");
    } catch (err) {
        alert("Error sharing screen: " + err);
    }
}

// --- Stop Screen Sharing ---
function stopScreenShare() {
    if (screenStream) {
        screenStream.getTracks().forEach(track => track.stop());
        screenStream = null;

        // Revert remote video to camera if call is still active
        if (localStream) {
            remoteVideo.srcObject = localStream;
        } else {
            remoteVideo.srcObject = null;
        }

        alert("Screen sharing stopped.");
    } else {
        alert("No screen sharing active.");
    }
}

// --- Recording ---
function startRecording() {
    if (!localStream && !screenStream) {
        alert("Start call or share screen first!");
        return;
    }
    const streamToRecord = screenStream || localStream;
    recordedChunks = [];
    mediaRecorder = new MediaRecorder(streamToRecord);
    mediaRecorder.ondataavailable = e => {
        if(e.data.size > 0) recordedChunks.push(e.data);
    };
    mediaRecorder.onstop = saveRecording;
    mediaRecorder.start();
    alert("Recording started!");
}

function stopRecording() {
    if (mediaRecorder && mediaRecorder.state !== "inactive") {
        mediaRecorder.stop();
        alert("Recording stopped and saved!");
    }
}

function saveRecording() {
    const blob = new Blob(recordedChunks, {type: "video/webm"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "video_call_recording.webm";
    a.click();
    URL.revokeObjectURL(url);
}
</script>

</body>
</html>
